{% extends "layout.html" %}

{% block content %}
<h2>User Settings</h2>

<form method="POST">
    <label for="currency">Preferred currency:</label>
    <select name="currency" id="currency">
        {% for c in currencies %}
            <option value="{{ c }}" {% if user.currency_preference == c %}selected{% endif %}>
                {{ c }}
            </option>
        {% endfor %}
    </select>

    <button type="submit">Save settings</button>
</form>

{% endblock %}
