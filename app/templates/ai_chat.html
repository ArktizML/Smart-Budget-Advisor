{% extends "layout.html" %}
{% block content %}

<h2>AI Expense Advisor</h2>

<div id="chat-box" style="
    width: 100%; 
    height: 400px; 
    border: 1px solid #ccc; 
    padding: 10px; 
    overflow-y: scroll; 
    background: #fafafa;">
</div>

<form id="chat-form">
    <input type="text" id="msg" placeholder="Ask something..." style="width: 80%;" required>
    <button type="submit" class="btn btn-success">Send</button>
</form>

<script>
const box = document.getElementById("chat-box");
const form = document.getElementById("chat-form");
const msg = document.getElementById("msg");

function addMessage(role, text) {
    const el = document.createElement("p");
    el.innerHTML = `<b>${role}:</b> ${text}`;
    box.appendChild(el);
    box.scrollTop = box.scrollHeight;
}

form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const content = msg.value.trim();
    if (!content) return;

    addMessage("You", content);
    msg.value = "";

    const res = await fetch("/ai_chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: content})
    });

    const data = await res.json();
    if (data.reply) {
        addMessage("AI", data.reply);
    }
});
</script>

{% endblock %}
