{% extends "layout.html" %}
    {% block content%}
        {% if expenses %}
        <div class="container mt-4">
            <h2 class="mb-3">Your Expenses</h2>
            <table class="table-responsive table table-striped table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Date</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Description</th>
                        <th>Options</th>
                    </tr>
                </thead>
                <tbody class="table-dark">
                    {% for e in expenses %}
                    <tr>
                        <td>{{ e.date }}</td>
                        <td>{{ e.category }}</td>
                        <td>{{ e.amount }}</td>
                        <td>{{ e.description }}</td>
                        <td><form action="/edit/{{ e.id }}" method="POST" style="display:inline;">
                        <a href="/edit/{{ e.id }}" class="btn btn-sm btn-warning me-1">Edit</a>
                        </form>
                        <form action="/delete/{{ e.id }}" method="POST" style="display:inline;">
                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?');">Delete</button>
                        </form></td>
                    </tr>
                    
                    {% endfor %}
                </tbody>
            </table>
        </div>
            <!-- {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="{{success}}" style="color: red; font-style: italic;">{{ message }}</div>
                {% endfor %}
            {% endif %}
            {% endwith %}
        {% else %}
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="{{success}}" style="color: red; font-style: italic;">{{ message }}</div>
                {% endfor %}
            {% endif %}
            {% endwith %} -->
            <p>No expenses yet.</p>
        {% endif %}
    {% endblock %}
