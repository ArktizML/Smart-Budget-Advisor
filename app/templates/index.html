<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Budget Advisor</title>
</head>
<body>
    <h1>Smart  Budget Advisor</h1>
    <a href="/add">➕ Add Expense</a>
    {% if expenses %}
        <table border="1" cellpadding="8">
            <tr>
                <th>Date</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Description</th>
            </tr>
            {% for e in expenses %}
            <tr>
                <td>{{ e.date }}</td>
                <td>{{ e.category }}</td>
                <td>{{ e.amount }}</td>
                <td>{{ e.description }}</td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>No expenses yet.</p>
    {% endif %}
</body>
</html>
