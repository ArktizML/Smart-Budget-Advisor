<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit expense</title>
</head>
<body>
   <h2>Edit expense</h2>
  <form action="/edit/{{ expense.id }}" method="POST">
    
        <label>Amount:</label><br>
        <input type="number" name="amount" step="0.01" value="{{ expense.amount }}" required><br><br>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div style="color: red; font-style: italic;">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <label>Category:</label><br>
        <input type="text" name="category" required value="{{ expense.category }}"><br><br>

        <label>Description (optional):</label><br>
        <input type="text" name="description" value="{{ expense.description }}"><br><br>
        <button type="submit">Update Expense</button>
  </form>
   <br><a href="/">Back to Dashboard</a>
</body>
</html>
