{% extends "layout.html" %}
{% block content %}

<div class="container mt-5" style="max-width: 600px;">
    <h2 class="mb-4 text-center">Edit Expense</h2>

    <form method="POST" action="/edit/{{ expense.id }}">

        <!-- Amount -->
        <div class="mb-3">
            <label class="form-label">Amount (zł)</label>
            <input type="number" step="0.01" class="form-control" 
                   name="amount" value="{{ expense.amount }}" required>
        </div>

        <!-- Category -->
        <div class="mb-3">
            <label class="form-label">Category</label>
            <select class="form-select" name="category" required>
                <option value="">Select category</option>
                <option {% if expense.category=='Food' %}selected{% endif %}>Food</option>
                <option {% if expense.category=='Transport' %}selected{% endif %}>Transport</option>
                <option {% if expense.category=='Rent' %}selected{% endif %}>Rent</option>
                <option {% if expense.category=='Shopping' %}selected{% endif %}>Shopping</option>
                <option {% if expense.category=='Entertainment' %}selected{% endif %}>Entertainment</option>
                <option {% if expense.category=='Other' %}selected{% endif %}>Other</option>
            </select>
        </div>

        <!-- Description -->
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" name="description" rows="3">{{ expense.description }}</textarea>
        </div>

        <!-- Submit -->
        <button class="btn btn-success w-100">Update Expense</button>
    </form>
</div>

{% endblock %}
